<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Company | SalesPro Technologies</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <aside class="sidebar">

        <h2>SalesPro Technologies</h2>

        <a href="/">🏠 Dashboard</a>

        <a href="/compare">⚖ Compare</a>

        <a href="/analytics">📊 Analytics</a>

        <a href="/export">📄 Export CSV</a>

    </aside>

    <main class="content">

        <h1>Add New Company</h1>

        <form action="/add" method="POST" class="form-grid">

            <div class="info-box">

                <h3>Company Details</h3>

                <input type="text" name="company_name" placeholder="Company Name" required>

                <input type="text" name="industry" placeholder="Industry">

                <input type="text" name="location" placeholder="Location">

                <input type="text" name="funding" placeholder="Funding">

                <input type="number" name="employees" placeholder="Employees">

                <input type="text" name="technology" placeholder="Technology">

            </div>

            <div class="info-box">

                <h3>Contact Details</h3>

                <input type="text" name="contact_person" placeholder="Contact Person">

                <input type="text" name="designation" placeholder="Designation">

                <input type="email" name="email" placeholder="Email">

                <input type="text" name="phone" placeholder="Phone">

                <input type="text" name="website" placeholder="Website">

            </div>

            <div class="info-box">

                <h3>Financial Details</h3>

                <input type="text" name="revenue" placeholder="Revenue">

                <input type="text" name="expenses" placeholder="Expenses">

                <input type="text" name="profit" placeholder="Profit">

                <input type="text" name="profit_margin" placeholder="Profit Margin">

                <select name="financial_status">

                    <option>Profitable</option>

                    <option>Loss</option>

                </select>

            </div>

            <div class="info-box">

                <h3>Sales Details</h3>

                <input type="number" name="lead_score" placeholder="Lead Score">

                <input type="text" name="buying_intent" placeholder="Buying Intent">

                <input type="text" name="lead_status" placeholder="Lead Status">

                <input type="text" name="priority" placeholder="Priority">

                <input type="text" name="expected_deal" placeholder="Expected Deal">

                <input type="text" name="follow_up" placeholder="Follow Up">

                <input type="number" name="win_probability" placeholder="Win Probability">

                <input type="text" name="growth_rate" placeholder="Growth Rate">

                <input type="number" step="0.1" name="customer_rating" placeholder="Customer Rating">

                <input type="text" name="last_contact" placeholder="Last Contact">

            </div>

            <div class="info-box">

                <h3>Decision Makers</h3>

                <input type="text" name="ceo" placeholder="CEO">

                <input type="text" name="sales_director" placeholder="Sales Director">

                <input type="text" name="finance_manager" placeholder="Finance Manager">

                <input type="text" name="procurement_head" placeholder="Procurement Head">

            </div>

            <div class="info-box">

                <h3>Notes & Recommendation</h3>

                <textarea name="recommendation"
                          rows="4"
                          placeholder="AI Recommendation"></textarea>

                <textarea name="notes"
                          rows="5"
                          placeholder="Sales Notes"></textarea>

            </div>

            <div style="grid-column:1/-1;text-align:center;">

                <button class="btn" type="submit">

                    ➕ Save Company

                </button>

            </div>

        </form>

    </main>

</div>

</body>

</html>
